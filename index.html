<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Самодисциплина · Наставник + Ученик</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #e2d9c9;
      font-family: 'Kalam', 'Segoe UI', cursive;
      padding: 14px;
    }

    @import url('https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&display=swap');

    .app {
      max-width: 620px;
      margin: 0 auto;
      background: #fffdf5;
      border-radius: 48px 32px 56px 32px;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    /* Логин */
    .login-container {
      padding: 40px 20px;
      text-align: center;
    }
    .google-btn {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 50px;
      padding: 14px 24px;
      font-size: 1.2rem;
      font-family: 'Kalam', cursive;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
    }
    .user-header {
      background: #fff0d6;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .logout-btn, .switch-btn {
      background: #e08e6a;
      border: none;
      border-radius: 30px;
      padding: 6px 16px;
      color: white;
      cursor: pointer;
      font-family: 'Kalam', cursive;
    }
    .tabs {
      display: flex;
      background: #faf2e2;
      border-bottom: 2px solid #eedbad;
      padding: 8px 16px 0;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tab-btn {
      flex: 1;
      font-family: 'Kalam', cursive;
      font-size: 0.9rem;
      font-weight: bold;
      padding: 10px 0 8px;
      background: none;
      border: none;
      color: #b28b54;
      cursor: pointer;
      border-bottom: 3px solid transparent;
    }
    .tab-btn.active {
      color: #4f3a1c;
      border-bottom-color: #e3b26b;
      background: linear-gradient(to top, #fff3e2, transparent);
    }
    .page { display: none; padding: 20px 16px 28px; }
    .page.active-page { display: block; }

    /* ВСЕ ОРИГИНАЛЬНЫЕ СТИЛИ (дейлики, задачи, архив, календарики) */
    .add-task {
      display: flex;
      gap: 12px;
      background: #fff6ea;
      border-radius: 60px;
      padding: 4px 8px;
      margin-bottom: 24px;
      box-shadow: inset 0 0 0 1px #fff0df, 0 2px 5px rgba(0,0,0,0.02);
    }
    .add-task input { flex: 1; background: transparent; border: none; padding: 12px; font-family: 'Kalam', cursive; font-size: 1rem; outline: none; }
    .add-task button { background: #f5e0bb; border: none; border-radius: 50px; padding: 0 24px; font-size: 1.6rem; font-weight: bold; color: #7b5a32; cursor: pointer; }

    .daily-global {
      background: #fef5e8;
      border-radius: 36px;
      margin-bottom: 28px;
      padding: 8px 12px 12px 16px;
      border: 1px solid #f0e2ce;
    }
    .daily-global-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 4px;
      cursor: pointer;
      font-weight: bold;
      color: #7b623c;
      font-size: 1.1rem;
      flex-wrap: wrap;
      gap: 8px;
    }
    .daily-progress-badge {
      background: #e7dbbc;
      border-radius: 40px;
      padding: 4px 12px;
      font-size: 0.75rem;
      font-family: monospace;
    }
    .daily-global-header.green { background: #e8f5e9; }
    .daily-list { list-style: none; margin-top: 8px; display: none; flex-direction: column; gap: 10px; }
    .daily-list.open { display: flex; }
    .daily-subtask { display: flex; align-items: center; gap: 12px; padding: 6px 0; border-bottom: 1px dashed #f0e2ce; }
    .daily-subtask input { width: 22px; height: 22px; accent-color: #7da06e; cursor: pointer; }
    .daily-subtask span { flex: 1; font-family: 'Kalam', cursive; font-size: 1rem; word-break: break-word; }
    .daily-subtask .completed { text-decoration: line-through; color: #84a06b; }
    .delete-daily-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #e08e6a; padding: 0 8px; }
    .add-daily { display: flex; gap: 8px; margin-top: 12px; }
    .add-daily input { flex: 1; font-family: 'Kalam', cursive; background: #fffaf2; border: 1px solid #eedcbb; border-radius: 40px; padding: 6px 12px; }
    .add-daily button { background: #efdfbe; border: none; border-radius: 30px; padding: 0 14px; cursor: pointer; font-size: 1.2rem; }

    .task-list { list-style: none; display: flex; flex-direction: column; gap: 14px; }
    .task-item {
      background: white;
      border-radius: 36px;
      padding: 12px 16px;
      border: 1px solid #f3ebdb;
      transition: 0.2s;
    }
    .task-main-row { display: flex; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
    .task-left { display: flex; align-items: flex-start; gap: 12px; flex: 1; min-width: 0; }
    .task-number { font-weight: 700; font-size: 1.35rem; color: #c9a05e; min-width: 40px; flex-shrink: 0; }
    .task-text { flex: 1; font-size: 1.2rem; line-height: 1.45; font-family: 'Kalam', cursive; color: #3e3522; white-space: normal; word-break: break-word; }
    .task-text.striked-red { position: relative; color: #8e7a5b; }
    .task-text.striked-red::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(180deg, transparent 0px, transparent 12px, #e65c5c 12px, #e65c5c 15px, transparent 15px, transparent 28px);
      background-size: 100% 28px;
      pointer-events: none;
    }
    .task-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 6px;
      margin-left: 52px;
      font-size: 0.7rem;
      color: #b19260;
    }
    .calendar-badge {
      background: #fef2e1;
      border-radius: 30px;
      padding: 4px 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      font-family: monospace;
      color: #b48a4b;
      cursor: pointer;
      position: relative;
    }
    .tooltip-custom {
      position: absolute;
      bottom: 140%;
      left: 50%;
      transform: translateX(-50%);
      background: #2c281ee6;
      backdrop-filter: blur(6px);
      color: #ffefcf;
      padding: 8px 14px;
      border-radius: 28px;
      font-size: 0.7rem;
      font-family: monospace;
      white-space: normal;
      min-width: 160px;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.18s;
      z-index: 1000;
    }
    .calendar-badge:hover .tooltip-custom,
    .calendar-badge:active .tooltip-custom { opacity: 1; }
    .swipe-hint { font-size: 1.2rem; margin-left: 8px; color: #ddc79b; flex-shrink: 0; }
    .task-item.completing { transform: translateX(110%); opacity: 0; transition: 0.35s cubic-bezier(0.2,0.9,0.4,1); pointer-events: none; }

    .completed-group {
      background: #fcf7ed;
      border-radius: 32px;
      margin-bottom: 20px;
      padding: 8px 12px;
    }
    .month-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.2rem;
      color: #b48742;
      border-left: 5px solid #e6bc7e;
      padding-left: 12px;
    }
    .month-content { display: none; margin-top: 8px; }
    .month-content.open { display: block; }
    .day-group { margin: 12px 0 12px 20px; }
    .day-header {
      display: flex;
      justify-content: space-between;
      padding: 6px 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: bold;
      color: #9c824f;
      background: #fff7ec;
      border-radius: 30px;
      margin: 6px 0;
    }
    .day-tasks { display: none; padding-left: 20px; }
    .day-tasks.open { display: block; }
    .completed-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 8px 8px 20px;
      font-family: 'Kalam', cursive;
      font-size: 1rem;
      border-left: 2px solid #dbbc87;
      margin: 6px 0;
    }
    .completed-item .task-text-archive { flex: 1; text-decoration: line-through; color: #7b6e51; word-break: break-word; }
    .revert-task-btn {
      background: none; border: none; font-size: 1rem; cursor: pointer; color: #b48b4a; padding: 4px 12px;
      text-decoration: none !important; font-family: 'Kalam', cursive;
    }
    .empty-msg { text-align: center; color: #cdbc94; padding: 30px; font-family: 'Kalam', cursive; }
    .streak-inline {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #fff0d6;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.8rem;
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="app">
  <div id="loginScreen" class="login-container">
    <h2>📋 Самодисциплина</h2>
    <button id="googleLoginBtn" class="google-btn">📧 Войти через Google</button>
  </div>
  <div id="appContainer" style="display: none;">
    <div class="user-header">
      <span id="userName"></span>
      <div>
        <button id="switchModeBtn" class="switch-btn">🔄 Переключить режим</button>
        <button id="logoutBtn" class="logout-btn">Выйти</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="mentorMe">📋 Мои задания</button>
      <button class="tab-btn" data-tab="kidTasks">👶 Задания ребёнка</button>
      <button class="tab-btn" data-tab="pendingApproval">⏳ На подтверждении</button>
    </div>

    <!-- МОЙ ЕЖЕДНЕВНИК (полностью как было) -->
    <div id="mentorMePage" class="page active-page">
      <div class="add-task">
        <input type="text" id="mainTaskInput" placeholder="Напишите задание...">
        <button id="addMainBtn">+</button>
      </div>
      <div class="daily-global">
        <div class="daily-global-header" id="dailyHeader">
          <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
            <span style="color:#3a86ff;">!</span>
            <span>📌 Ежедневные рутины (дейлики)</span>
            <div class="streak-inline"><span class="streak-icon">🔥</span><span id="inlineStreakDays">0</span><span>подряд</span></div>
          </div>
          <span class="daily-progress-badge" id="dailyProgressBadge">0/0</span>
        </div>
        <ul class="daily-list" id="dailyList"></ul>
        <div class="add-daily" id="addDailyContainer" style="display:none;">
          <input id="newDailyInput" placeholder="новая подзадача...">
          <button id="addDailyBtn">+</button>
        </div>
      </div>
      <ul id="activeList" class="task-list"></ul>
    </div>

    <!-- ЗАДАНИЯ РЕБЁНКА (наставник видит и может добавить) -->
    <div id="kidTasksPage" class="page">
      <div class="add-task">
        <input type="text" id="kidTaskInput" placeholder="Задание для ребёнка...">
        <button id="addKidTaskBtn">+</button>
      </div>
      <!-- Дейлики ребёнка (только просмотр) -->
      <div class="daily-global">
        <div class="daily-global-header" id="kidDailyHeader">
          <span>👶 Дейлики ребёнка</span>
          <span class="daily-progress-badge" id="kidDailyProgress">0/0</span>
        </div>
        <ul class="daily-list" id="kidDailyList"></ul>
      </div>
      <ul id="kidActiveList" class="task-list"></ul>
    </div>

    <!-- НА ПОДТВЕРЖДЕНИИ -->
    <div id="pendingApprovalPage" class="page">
      <ul id="pendingList" class="task-list"></ul>
    </div>

    <!-- архив для наставника (оставлен как было) -->
    <div id="completedPage" style="display:none;"></div>
  </div>
</div>

<script>
  // FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyAHYG7vhz3PJkK5uEx_mI4j5ZBSXizbBtU",
    authDomain: "assignments-ganets.firebaseapp.com",
    projectId: "assignments-ganets",
    storageBucket: "assignments-ganets.firebasestorage.app",
    messagingSenderId: "468949754488",
    appId: "1:468949754488:web:2b0613098f24026c41038d"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser = null;
  let kidEmail = null;
  let currentView = 'mentor'; // mentor / kid

  // Мои данные (локальные)
  let mainTasks = [], dailySubtasks = [], streakDays = 0, lastCompletedDate = null;
  const STORAGE_KEY = "hand_daily_global_calendar_v10";
  const STREAK_KEY = "daily_streak_v10";

  // Данные ребёнка (будем подгружать из Firestore)
  let kidTasks = [], kidDaily = [], kidStreakDays = 0;

  // Достижения
  const ACHIEVEMENTS = [
    { days: 7, icon: "🌿", message: "🎉 7 дней подряд! Можешь порадовать себя любимой вкусняшкой 🍰" },
    { days: 15, icon: "🌸", message: "🌟 15 дней подряд! Отличная дисциплина! 🎬" },
    { days: 30, icon: "🏆", message: "🏆 30 дней подряд! Ты огонь! 🍽️" },
    { days: 60, icon: "💎", message: "💎 60 дней подряд! Вау! 📱" },
    { days: 180, icon: "👑", message: "👑 Полгода подряд! Ты легенда! 🎁" },
    { days: 365, icon: "🌟", message: "🎊 ГОД подряд! Невероятно! 🎉🎂" }
  ];
  let lastAchievementNotified = 0;

  // DOM
  const loginDiv = document.getElementById('loginScreen');
  const appDiv = document.getElementById('appContainer');
  const userNameSpan = document.getElementById('userName');

  // HELPER
  function formatDate(iso) { if(!iso) return ''; const d=new Date(iso); return d.toLocaleDateString(); }

  // ========== МОИ ДЕЙЛИКИ И ЗАДАЧИ (ЛОКАЛЬНЫЙ КОД) ==========
  function loadMyData() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if(stored) { let d=JSON.parse(stored); mainTasks=d.mainTasks||[]; dailySubtasks=d.dailySubtasks||[]; }
    if(mainTasks.length===0) mainTasks=[];
    if(dailySubtasks.length===0) dailySubtasks=[];
    loadMyStreak();
    checkAndResetMyDaily();
    renderMyTasks();
    renderMyDaily();
  }
  function saveMyData() { localStorage.setItem(STORAGE_KEY,JSON.stringify({mainTasks,dailySubtasks})); }
  function addMyTask(t){ if(!t.trim())return; mainTasks.push({id:Date.now(),text:t.trim(),createdAt:new Date().toISOString(),completedAt:null,status:"active"}); saveMyData(); renderMyTasks(); }
  async function completeMyTask(id,el){ let task=mainTasks.find(t=>t.id==id); if(!task||task.status==="completed")return; let span=el.querySelector('.task-text'); if(span) span.classList.add('striked-red'); el.classList.add('completing'); await new Promise(r=>setTimeout(r,270)); task.status="completed"; task.completedAt=new Date().toISOString(); saveMyData(); renderMyTasks(); }
  function revertMyTask(id){ let t=mainTasks.find(t=>t.id==id); if(t&&t.status==="completed"){ t.status="active"; t.completedAt=null; saveMyData(); renderMyTasks(); } }
  function deleteMyDaily(idx){ dailySubtasks.splice(idx,1); saveMyData(); renderMyDaily(); renderMyTasks(); }
  function addMyDaily(text){ if(!text.trim())return; dailySubtasks.push({id:Date.now(),text:text.trim(),done:false}); saveMyData(); renderMyDaily(); document.getElementById('newDailyInput').value=''; }
  function renderMyTasks(){ let cont=document.getElementById('activeList'); if(!cont)return; let active=mainTasks.filter(t=>t.status==='active'); if(active.length===0){ cont.innerHTML='<li class="empty-msg">✨ Нет активных задач, добавьте сверху</li>'; return; } cont.innerHTML=''; active.forEach((t,idx)=>{ let li=document.createElement('li');li.className='task-item'; li.innerHTML=`<div class="task-main-row"><div class="task-left"><span class="task-number">${idx+1}.</span><span class="task-text">${escapeHtml(t.text)}</span></div><span class="swipe-hint">↜</span></div><div class="task-meta"><span class="calendar-badge">📅<div class="tooltip-custom">➕ Добавлено: ${new Date(t.createdAt).toLocaleString()}<br>⏳ Активно</div></span><span>${new Date(t.createdAt).toLocaleDateString()}</span></div>`; attachSwipe(li,t.id); cont.appendChild(li); }); }
  function renderMyDaily(){ let cont=document.getElementById('dailyList'); let badge=document.getElementById('dailyProgressBadge'); let complete=dailySubtasks.filter(d=>d.done).length; badge.innerText=`${complete}/${dailySubtasks.length}`; if(dailySubtasks.length===0){ cont.innerHTML='<div style="padding:12px; text-align:center;">✨ Нет дейликов</div>'; return; } cont.innerHTML=''; dailySubtasks.forEach((d,idx)=>{ let li=document.createElement('li');li.className='daily-subtask'; let cb=document.createElement('input');cb.type='checkbox';cb.checked=d.done; cb.onchange=()=>{ d.done=!d.done; saveMyData(); renderMyDaily(); checkMyStreakAfterChange(); }; let span=document.createElement('span');span.innerText=d.text; if(d.done)span.classList.add('completed'); let del=document.createElement('button');del.innerHTML='✕';del.className='delete-daily-btn'; del.onclick=()=>deleteMyDaily(idx); li.appendChild(cb);li.appendChild(span);li.appendChild(del); cont.appendChild(li); }); }
  function checkMyStreakAfterChange(){ let all=dailySubtasks.every(d=>d.done); if(all){ let today=new Date().toDateString(); if(!lastCompletedDate||new Date(lastCompletedDate).toDateString()!==today){ if(lastCompletedDate){ let diff=Math.floor((new Date()-new Date(lastCompletedDate))/(24*3600000)); if(diff===1)streakDays++; else if(diff>1)streakDays=1; }else streakDays=1; lastCompletedDate=new Date().toISOString(); saveMyStreak(); updateMyStreakDisplay(); } }}
  function loadMyStreak(){ let s=localStorage.getItem(STREAK_KEY); if(s){ let d=JSON.parse(s); streakDays=d.streakDays||0; lastCompletedDate=d.lastCompletedDate; lastAchievementNotified=d.lastAchievementNotified||0; } updateMyStreakDisplay(); }
  function saveMyStreak(){ localStorage.setItem(STREAK_KEY,JSON.stringify({streakDays,lastCompletedDate,lastAchievementNotified})); }
  function updateMyStreakDisplay(){ let daysSpan=document.getElementById('inlineStreakDays'); if(daysSpan)daysSpan.textContent=streakDays; let iconSpan=document.querySelector('#streakInline .streak-icon'); let icon='🔥'; for(let a of ACHIEVEMENTS)if(streakDays>=a.days)icon=a.icon; if(iconSpan)iconSpan.textContent=icon; for(let a of ACHIEVEMENTS)if(streakDays>=a.days&&lastAchievementNotified<a.days){ showNotification(a.message); lastAchievementNotified=a.days; saveMyStreak(); } }
  function checkAndResetMyDaily(){ let today=new Date().toDateString(); let last=localStorage.getItem("daily_last_reset_v10"); if(last!==today){ let wasAll=dailySubtasks.length>0&&dailySubtasks.every(d=>d.done); for(let d of dailySubtasks)d.done=false; saveMyData(); if(!wasAll&&last){ streakDays=0; lastCompletedDate=null; saveMyStreak(); updateMyStreakDisplay(); } localStorage.setItem("daily_last_reset_v10",today); renderMyDaily(); } }
  function attachSwipe(el,id){ let startX=0,swiping=false; el.addEventListener('touchstart',e=>{ startX=e.touches[0].clientX; swiping=false; }); el.addEventListener('touchmove',e=>{ let dx=e.touches[0].clientX-startX; if(Math.abs(dx)>20){ e.preventDefault(); swiping=true; el.style.transform=`translateX(${dx*0.25}px)`; } }); el.addEventListener('touchend',e=>{ if(swiping&&e.changedTouches[0]){ let delta=e.changedTouches[0].clientX-startX; if(Math.abs(delta)>55)completeMyTask(id,el); } el.style.transform=''; }); }
  function showNotification(msg){ let d=document.createElement('div'); d.textContent=msg; d.style.cssText='position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#4caf50; color:white; padding:12px 20px; border-radius:50px; z-index:2000; font-family:Kalam;'; document.body.appendChild(d); setTimeout(()=>d.remove(),4000); }
  function escapeHtml(s){ let div=document.createElement('div'); div.textContent=s; return div.innerHTML; }

  // ========== FIRESTORE: ЗАДАНИЯ РЕБЁНКА ==========
  async function loadKidDataFromFirestore(){
    if(!kidEmail) return;
    // подписываемся на задачи ребёнка
    db.collection('kidTasks').where('kidEmail','==',kidEmail).orderBy('createdAt','desc').onSnapshot(snap=>{ kidTasks=snap.docs.map(d=>({id:d.id,...d.data()})); renderKidTasks(); });
    // дейлики ребёнка
    db.collection('kidDaily').doc(kidEmail).onSnapshot(doc=>{ if(doc.exists) kidDaily=doc.data().items||[]; else kidDaily=[]; renderKidDaily(); });
    // streak ребёнка (будет отдельно)
    db.collection('kidStreak').doc(kidEmail).onSnapshot(doc=>{ if(doc.exists) kidStreakDays=doc.data().streakDays||0; else kidStreakDays=0; document.getElementById('kidDailyProgress').innerText=`${kidDaily.filter(d=>d.done).length}/${kidDaily.length}`; });
  }
  function renderKidTasks(){ let cont=document.getElementById('kidActiveList'); if(!cont)return; let active=kidTasks.filter(t=>t.status==='active'); if(active.length===0){ cont.innerHTML='<li class="empty-msg">✨ Нет заданий для ребёнка</li>'; return; } cont.innerHTML=''; active.forEach((t,idx)=>{ let li=document.createElement('li');li.className='task-item'; li.innerHTML=`<div class="task-main-row"><div class="task-left"><span class="task-number">${idx+1}.</span><span class="task-text">${escapeHtml(t.text)}</span></div></div><div class="task-meta">📅 ${t.createdAt?new Date(t.createdAt.toDate()).toLocaleDateString():''}</div>`; cont.appendChild(li); }); }
  function renderKidDaily(){ let cont=document.getElementById('kidDailyList'); let badge=document.getElementById('kidDailyProgress'); let completed=kidDaily.filter(d=>d.done).length; badge.innerText=`${completed}/${kidDaily.length}`; if(kidDaily.length===0){ cont.innerHTML='<div style="padding:12px; text-align:center;">✨ У ребёнка нет дейликов</div>'; return; } cont.innerHTML=''; kidDaily.forEach((d,idx)=>{ let li=document.createElement('li');li.className='daily-subtask'; let cb=document.createElement('input');cb.type='checkbox';cb.checked=d.done; cb.disabled=true; let span=document.createElement('span');span.innerText=d.text; if(d.done)span.classList.add('completed'); li.appendChild(cb);li.appendChild(span); cont.appendChild(li); }); }
  async function addKidTask(text){ if(!text.trim()||!kidEmail)return; await db.collection('kidTasks').add({ text:text.trim(), status:'active', kidEmail, createdAt:firebase.firestore.FieldValue.serverTimestamp() }); renderKidTasks(); }
  // подтверждение / отклонение
  async function approvePending(taskId){ await db.collection('kidTasks').doc(taskId).update({ status:'approved', approvedAt:firebase.firestore.FieldValue.serverTimestamp() }); await db.collection('pendingApprovals').doc(taskId).delete(); renderPendingApprovals(); }
  async function rejectPending(taskId){ await db.collection('kidTasks').doc(taskId).update({ status:'active' }); await db.collection('pendingApprovals').doc(taskId).delete(); renderPendingApprovals(); }
  async function loadPendingApprovals(){ db.collection('pendingApprovals').where('mentorEmail','==',currentUser?.email).onSnapshot(snap=>{ let pendings=snap.docs.map(d=>({id:d.id,...d.data()})); renderPendingApprovals(pendings); }); }
  function renderPendingApprovals(list){ let cont=document.getElementById('pendingList'); if(!cont)return; if(!list||list.length===0){ cont.innerHTML='<li class="empty-msg">⏳ Нет запросов на подтверждение</li>'; return; } cont.innerHTML=''; list.forEach(p=>{ let li=document.createElement('li');li.className='task-item'; li.innerHTML=`<div class="task-row"><span class="task-text">${escapeHtml(p.text)}</span><span class="task-status">⏳ Ожидает</span></div><div class="task-actions"><button class="confirm-btn" data-id="${p.id}">✅ Подтвердить</button> <button class="reject-btn" data-id="${p.id}">❌ Отклонить</button></div>`; cont.appendChild(li); }); document.querySelectorAll('.confirm-btn').forEach(b=>b.onclick=()=>approvePending(b.dataset.id)); document.querySelectorAll('.reject-btn').forEach(b=>b.onclick=()=>rejectPending(b.dataset.id)); }

  // ========== АВТОРИЗАЦИЯ И РЕЖИМЫ ==========
  auth.onAuthStateChanged(async user=>{
    if(!user){ loginDiv.style.display='block'; appDiv.style.display='none'; return; }
    currentUser=user;
    loginDiv.style.display='none';
    appDiv.style.display='block';
    userNameSpan.textContent=`${user.displayName||user.email}`;
    if(!kidEmail){ let mail=prompt('Введите email ребёнка (его Google-аккаунт):'); if(mail) kidEmail=mail; else kidEmail='none'; }
    loadMyData();
    await loadKidDataFromFirestore();
    await loadPendingApprovals();
    renderMyTasks(); renderMyDaily(); renderKidTasks(); renderKidDaily();
  });
  document.getElementById('googleLoginBtn').onclick=async()=>{ const p=new firebase.auth.GoogleAuthProvider(); await auth.signInWithPopup(p); };
  document.getElementById('logoutBtn').onclick=()=>auth.signOut();
  document.getElementById('switchModeBtn').onclick=()=>{ if(currentView==='mentor'){ currentView='kid'; document.querySelectorAll('.tab-btn')[0].style.display='none'; document.querySelectorAll('.tab-btn')[1].style.display='block'; document.querySelectorAll('.tab-btn')[2].style.display='block'; }else{ currentView='mentor'; document.querySelectorAll('.tab-btn')[0].style.display='block'; document.querySelectorAll('.tab-btn')[1].style.display='block'; document.querySelectorAll('.tab-btn')[2].style.display='block'; } };

  // Инициализация интерфейса
  document.getElementById('addMainBtn').onclick=()=>addMyTask(document.getElementById('mainTaskInput').value);
  document.getElementById('mainTaskInput').addEventListener('keypress',e=>{if(e.key==='Enter')addMyTask(e.target.value);});
  document.getElementById('addDailyBtn').onclick=()=>addMyDaily(document.getElementById('newDailyInput').value);
  document.getElementById('newDailyInput').addEventListener('keypress',e=>{if(e.key==='Enter')addMyDaily(e.target.value);});
  document.getElementById('addKidTaskBtn').onclick=()=>addKidTask(document.getElementById('kidTaskInput').value);
  document.getElementById('dailyHeader').onclick=()=>{ let l=document.getElementById('dailyList'); let a=document.getElementById('addDailyContainer'); l.classList.toggle('open'); a.style.display=l.classList.contains('open')?'flex':'none'; };
  // переключение вкладок
  const btns=document.querySelectorAll('.tab-btn');
  const pagesMap={mentorMe:document.getElementById('mentorMePage'),kidTasks:document.getElementById('kidTasksPage'),pendingApproval:document.getElementById('pendingApprovalPage')};
  btns.forEach(btn=>{ btn.onclick=()=>{ btns.forEach(b=>b.classList.remove('active')); btn.classList.add('active'); Object.values(pagesMap).forEach(p=>p.classList.remove('active-page')); pagesMap[btn.dataset.tab].classList.add('active-page'); }; });
  if(!localStorage.getItem('daily_last_reset_v10')) localStorage.setItem('daily_last_reset_v10',new Date().toDateString());
</script>
</body>
</html>
